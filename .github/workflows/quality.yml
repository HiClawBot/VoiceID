name: Quality gate

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  static-site:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Check commit whitespace
        run: git diff-tree --check --no-commit-id -r HEAD^ HEAD

      - name: Audit pages, links, resources, and safety invariants
        run: python3 scripts/check_site.py

      - name: Check JavaScript syntax
        run: |
          node --check script.js
          node --check beta/beta.js
          node --check beta/adapters/voice-proof.js
          node --check beta/adapters/wallet-provider.js
